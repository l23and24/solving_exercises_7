<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Розв'язування задач</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        .accordion-item.active .accordion-content {
            max-height: 600px;
        }
        .accordion-item.active .arrow-icon {
            transform: rotate(180deg);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <!-- Header -->
    <header class="bg-slate-800 text-white py-8 px-4 shadow-lg">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold mb-2">Розв'язування задач</h1>
            <p class="text-slate-300">Структурований каталог матеріалів від 67 до 105</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto py-10 px-4">
        <div id="navigation-container" class="space-y-4">
            <!-- Пункти меню будуть згенеровані тут -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-10 text-gray-500 text-sm">
        <p>© 2024 GitHub Repository Index • Створено для зручної навігації</p>
    </footer>

    <script>
        const container = document.getElementById('navigation-container');

        // Функція для створення блоку меню
        function createMenuItem(number) {
            const item = document.createElement('div');
            item.className = 'accordion-item bg-white rounded-lg border border-gray-200 shadow-sm overflow-hidden';
            
            // Масив підпунктів (уроків)
            const subItems = [
                { label: `${number}.1`, link: `./${number}.1/index.html` },
                { label: `${number}.2`, link: `./${number}.2/index.html` },
                { label: `${number}.3`, link: `./${number}.3/index.html` },
                { label: `${number}.4`, link: `./${number}.4/index.html` },
                { label: `${number}.5`, link: `./${number}.5/index.html` }
            ];

            const subItemsHtml = subItems.map(sub => `
                <a href="${sub.link}" class="block px-6 py-3 text-blue-600 hover:bg-blue-50 hover:text-blue-800 transition-colors border-b border-gray-50 last:border-0">
                    📖 Перейти до уроку ${sub.label}
                </a>
            `).join('');

            item.innerHTML = `
                <button class="w-full px-6 py-4 flex items-center justify-between bg-white hover:bg-gray-50 transition-colors focus:outline-none" onclick="toggleAccordion(this)">
                    <span class="text-lg font-semibold text-gray-700">Урок ${number}</span>
                    <svg class="arrow-icon w-5 h-5 text-gray-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div class="accordion-content bg-gray-50">
                    <div class="py-2">
                        ${subItemsHtml}
                    </div>
                </div>
            `;
            return item;
        }

        // Генерація списку уроків від 67 до 105
        for (let i = 67; i <= 105; i++) {
            container.appendChild(createMenuItem(i));
        }

        // Функція перемикання акордеона
        function toggleAccordion(element) {
            const parent = element.parentElement;
            const isActive = parent.classList.contains('active');
            
            // Закриваємо всі інші
            document.querySelectorAll('.accordion-item').forEach(item => {
                item.classList.remove('active');
            });

            // Відкриваємо поточний
            if (!isActive) {
                parent.classList.add('active');
            }
        }
    </script>
</body>
</html>
